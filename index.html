<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <div class="balance-box">
            <span>Total Balance</span>
            <h1 id="total-balance">Rp 0</h1>
        </div>

        <div class="form-box">
            <h2>Add Transaction</h2>
            <div id="error-msg" class="error hidden">Please fill in all fields.</div>
            <div class="form-group">
                <label for="item-name">Item Name</label>
                <input type="text" id="item-name" placeholder="e.g. Lunch" />
            </div>
            <div class="form-group">
                <label for="amount">Amount (Rp)</label>
                <input type="number" id="amount" placeholder="e.g. 25000" min="1" />
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="">-- Select Category --</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Fun">Fun</option>
                </select>
            </div>
            <button id="add-btn">Add Transaction</button>
        </div>

        <div class="content-row">
            <div class="list-box">
                <h2>Transaction List</h2>
                <ul id="transaction-list">
                    <li class="empty-msg">No transactions yet.</li>
                </ul>
            </div>

            <div class="chart-box">
                <h2>Spending by Category</h2>
                <canvas id="pie-chart"></canvas>
                <p id="chart-empty" class="empty-msg">No data to display.</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
